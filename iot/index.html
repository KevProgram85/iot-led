<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control IoT LED</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="contenedor">

    <h1>Control de LED</h1>

    <!-- Imagen opcional -->
    <img src="https://cdn-icons-png.flaticon.com/512/1042/1042330.png" class="imagen">

    <!-- LED visual -->
    <div id="led" class="led apagado"></div>

    <!-- Botones -->
    <div>
      <button class="btn encender" onclick="encender()">ENCENDER</button>
      <button class="btn apagar" onclick="apagar()">APAGAR</button>
    </div>

    <!-- Estado -->
    <div id="estado" class="estado apagado">
      ● APAGADO
    </div>

    <!-- Información extra -->
    <p id="info">Última acción: ---</p>

  </div>

  <script src="scrip.js"></script>
</body>
</html>
